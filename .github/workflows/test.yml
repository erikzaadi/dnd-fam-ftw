name: Test

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'packages/**'
  pull_request:
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'packages/**'
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      e2e: >-
        ${{
          steps.filter.outputs.backend == 'true' ||
          steps.filter.outputs.frontend == 'true' ||
          steps.filter.outputs.packages == 'true'
        }}
      frontend: ${{ steps.filter.outputs.frontend }}
      packages: ${{ steps.filter.outputs.packages }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            packages:
              - 'packages/**'

  test-backend-unit:
    name: Test Backend Unit
    needs: changes
    if: >-
      needs.changes.outputs.backend == 'true' ||
      needs.changes.outputs.packages == 'true' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install and build shared
        run: cd packages/shared && npm ci && npm run build

      - name: Install deps
        run: cd backend && npm ci

      - name: Run tests
        run: cd backend && npm test

  test-backend-integration:
    name: Test Backend Integration
    needs: changes
    if: >-
      needs.changes.outputs.backend == 'true' ||
      needs.changes.outputs.packages == 'true' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install and build shared
        run: cd packages/shared && npm ci && npm run build

      - name: Install deps
        run: cd backend && npm ci

      - name: Run integration tests
        run: cd backend && npm run test:integration

  test-frontend:
    name: Test Frontend Unit
    needs: changes
    if: >-
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.packages == 'true' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install deps
        run: cd frontend && npm ci

      - name: Run tests
        run: cd frontend && npm test

  test-e2e:
    name: Test E2E
    needs: changes
    if: needs.changes.outputs.e2e == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-playwright
        with:
          install-command: npm run ci:all && npm run build --prefix packages/shared

      - name: Run e2e tests
        run: cd frontend && npm run test:e2e

  notify:
    needs:
      - test-backend-unit
      - test-backend-integration
      - test-frontend
      - test-e2e
    if: >-
      always() &&
      (
        needs.test-backend-unit.result != 'skipped' ||
        needs.test-backend-integration.result != 'skipped' ||
        needs.test-frontend.result != 'skipped' ||
        needs.test-e2e.result != 'skipped'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Determine status
        id: result
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "status=failure" >> "$GITHUB_OUTPUT"
          else
            echo "status=success" >> "$GITHUB_OUTPUT"
          fi

      - uses: ./.github/actions/notify-pushover
        if: steps.result.outputs.status == 'failure'
        with:
          status: ${{ steps.result.outputs.status }}
          token: ${{ secrets.PUSHOVER_TOKEN }}
          user: ${{ secrets.PUSHOVER_USER }}
          title: Test
