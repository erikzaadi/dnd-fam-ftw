name: Visual Snapshots

# Runs on version tags alongside deploy - does not block it.
# Uses the 'ci' GitHub environment (secrets scoped to tags on main).
#
# Required secrets in the 'ci' environment:
#   AWS_ACCESS_KEY_ID     - from terraform output ci_access_key_id
#   AWS_SECRET_ACCESS_KEY - from terraform output ci_secret_access_key
#   OPENAI_API_KEY        - for seed session display name generation
#   VISUAL_SNAPSHOTS_BUCKET - from terraform output snapshots_bucket_name
#
# First-time setup: run workflow_dispatch with update_snapshots=true to
# generate and push the initial baselines to S3. Subsequent tag runs
# compare against those baselines and fail on visual regressions.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: Regenerate baselines and push to S3 (accept current visuals)
        type: boolean
        default: false

env:
  AWS_REGION: eu-west-1
  SNAPSHOT_PATH: frontend/tests/__snapshots__


jobs:
  snapshots:
    runs-on: ubuntu-latest
    environment: ci

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends curl jq

      - name: Install dependencies
        run: npm install && npm run install:all

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Download snapshot baselines from S3
        if: github.event.inputs.update_snapshots != 'true'
        run: |
          mkdir -p "$SNAPSHOT_PATH"
          aws s3 sync "s3://${{ secrets.VISUAL_SNAPSHOTS_BUCKET }}/snapshots" "$SNAPSHOT_PATH" || true

      - name: Start dev server
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npm run dev > /tmp/dev-server.log 2>&1 &

      - name: Wait for dev server
        run: |
          echo "Waiting for dev server..."
          timeout 90 bash -c 'until curl -sf http://localhost:5173/api/sessions > /dev/null 2>&1; do sleep 2; done'
          echo "Dev server ready."

      - name: Seed sessions
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npm run cli -- sessions seed

      - name: Run visual tests
        run: |
          if [ "${{ github.event.inputs.update_snapshots }}" = "true" ]; then
            npx playwright test --update-snapshots
          else
            npx playwright test
          fi
        working-directory: frontend

      - name: Push updated baselines to S3
        if: github.event.inputs.update_snapshots == 'true'
        run: aws s3 sync "$SNAPSHOT_PATH" "s3://${{ secrets.VISUAL_SNAPSHOTS_BUCKET }}/snapshots" --delete

      - name: Stop dev server
        if: always()
        run: pkill -f 'tsx|vite' || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report/
