# Deploy workflow.
# Triggered automatically on version tags (v*), or manually via workflow_dispatch.
# Detects whether backend and/or frontend changed since last deploy,
# and only deploys what changed. Tag pushes always deploy everything.
# Use force_* inputs to override change detection on manual runs.
# See github-secrets.md (not committed) for required secrets.

name: Deploy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      force_backend:
        description: Force backend deploy (ignore change detection)
        type: boolean
        default: false
      force_frontend:
        description: Force frontend deploy (ignore change detection)
        type: boolean
        default: false

env:
  AWS_REGION: eu-west-1
  SSM_PREFIX: /dnd-fam-ftw/prod
  CURRENT_DIR: /opt/dnd-fam-ftw/current
  APP_ENV_FILE: /opt/dnd-fam-ftw/app.env
  SERVICE_NAME: dnd-fam-ftw
  SSH_USER: ubuntu

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Open SSH for this runner
        id: ssh_access
        run: |
          RUNNER_IP=$(curl -s https://checkip.amazonaws.com)
          echo "runner_ip=$RUNNER_IP" >> "$GITHUB_OUTPUT"
          aws lightsail open-instance-public-ports \
            --no-cli-pager \
            --instance-name "${{ secrets.LIGHTSAIL_INSTANCE_NAME }}" \
            --port-info fromPort=22,toPort=22,protocol=TCP,cidrs="[\"$RUNNER_IP/32\"]"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.LIGHTSAIL_HOST }}" >> ~/.ssh/known_hosts

      # ── Change detection ────────────────────────────────────────────────────

      - name: Get last deployed SHAs
        id: last_deploy
        run: |
          BACKEND_SHA=$(aws ssm get-parameter \
            --name "$SSM_PREFIX/LAST_DEPLOYED_BACKEND_SHA" \
            --query 'Parameter.Value' --output text 2>/dev/null || echo "")
          FRONTEND_SHA=$(aws ssm get-parameter \
            --name "$SSM_PREFIX/LAST_DEPLOYED_FRONTEND_SHA" \
            --query 'Parameter.Value' --output text 2>/dev/null || echo "")
          {
            echo "backend_sha=$BACKEND_SHA"
            echo "frontend_sha=$FRONTEND_SHA"
          } >> "$GITHUB_OUTPUT"
          echo "Last backend: ${BACKEND_SHA:-none}"
          echo "Last frontend: ${FRONTEND_SHA:-none}"

      - name: Detect changes
        id: changes
        run: |
          CURRENT="$GITHUB_SHA"
          BACKEND_SHA="${{ steps.last_deploy.outputs.backend_sha }}"
          FRONTEND_SHA="${{ steps.last_deploy.outputs.frontend_sha }}"

          DEPLOY_BACKEND=false
          DEPLOY_FRONTEND=false

          if [[ "${{ inputs.force_backend }}" == "true" ]] || [[ -z "$BACKEND_SHA" ]]; then
            DEPLOY_BACKEND=true
          elif git diff --name-only "$BACKEND_SHA" "$CURRENT" | grep -q "^backend/"; then
            DEPLOY_BACKEND=true
          fi

          if [[ "${{ inputs.force_frontend }}" == "true" ]] || [[ -z "$FRONTEND_SHA" ]]; then
            DEPLOY_FRONTEND=true
          elif git diff --name-only "$FRONTEND_SHA" "$CURRENT" | grep -q "^frontend/"; then
            DEPLOY_FRONTEND=true
          fi

          GIT_VERSION=$(git describe --tags --always)
          {
            echo "deploy_backend=$DEPLOY_BACKEND"
            echo "deploy_frontend=$DEPLOY_FRONTEND"
            echo "git_version=$GIT_VERSION"
          } >> "$GITHUB_OUTPUT"
          echo "Deploy - backend: $DEPLOY_BACKEND, frontend: $DEPLOY_FRONTEND, version: $GIT_VERSION"

      # ── Backend ─────────────────────────────────────────────────────────────

      - name: Build backend
        if: steps.changes.outputs.deploy_backend == 'true'
        working-directory: backend
        run: npm ci && npm run build && npm prune --omit=dev

      - name: Sync backend to instance
        if: steps.changes.outputs.deploy_backend == 'true'
        run: |
          rsync -avz --delete \
            backend/dist/ "$SSH_USER@${{ secrets.LIGHTSAIL_HOST }}:$CURRENT_DIR/dist/"
          rsync -avz --delete \
            backend/public/ "$SSH_USER@${{ secrets.LIGHTSAIL_HOST }}:$CURRENT_DIR/public/"
          rsync -avz --delete \
            backend/node_modules/ "$SSH_USER@${{ secrets.LIGHTSAIL_HOST }}:$CURRENT_DIR/node_modules/"
          rsync -avz \
            backend/package.json \
            backend/package-lock.json \
            "$SSH_USER@${{ secrets.LIGHTSAIL_HOST }}:$CURRENT_DIR/"

      - name: Write app.env and restart service
        if: steps.changes.outputs.deploy_backend == 'true'
        env:
          API_DOMAIN: ${{ secrets.API_DOMAIN }}
          FRONTEND_DOMAIN: ${{ secrets.FRONTEND_DOMAIN }}
          IMAGE_BUCKET_NAME: ${{ secrets.IMAGE_BUCKET_NAME }}
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
        run: |
          SSM_PARAMS=$(aws ssm get-parameters-by-path \
            --path "$SSM_PREFIX" \
            --with-decryption \
            --query 'Parameters[*].[Name,Value]' \
            --output text)

          APP_ENV=$(cat << APPENV
          # Written by GitHub Actions on $(date -u +"%Y-%m-%dT%H:%M:%SZ") - do not edit manually

          # App
          APP_BASE_PATH=/
          PORT=3001
          APP_VERSION=${{ steps.changes.outputs.git_version }}

          # Database (on attached disk)
          SQLITE_DB_PATH=/mnt/dnd-fam-ftw-data/app.db

          # Images (S3)
          IMAGE_STORAGE_PROVIDER=s3
          AWS_REGION=$AWS_REGION
          S3_IMAGE_BUCKET=$IMAGE_BUCKET_NAME
          S3_IMAGE_PREFIX=generated/
          S3_IMAGE_PUBLIC_BASE_URL=https://$FRONTEND_DOMAIN

          # Auth
          FRONTEND_URL=https://$FRONTEND_DOMAIN
          GOOGLE_CALLBACK_URL=https://$API_DOMAIN/auth/google/callback
          APPENV
          )

          while IFS=$'\t' read -r name value; do
            key="${name##*/}"
            [[ "$key" == LAST_DEPLOYED_* ]] && continue
            [[ "$key" == CERTBOT_* ]] && continue
            APP_ENV="${APP_ENV}"$'\n'"${key}=${value}"
          done <<< "$SSM_PARAMS"

          # shellcheck disable=SC2029
          echo "$APP_ENV" | ssh "$SSH_USER@$LIGHTSAIL_HOST" \
            "sudo tee $APP_ENV_FILE > /dev/null && \
             sudo chmod 600 $APP_ENV_FILE && \
             sudo chown ubuntu:ubuntu $APP_ENV_FILE"

          # shellcheck disable=SC2029
          ssh "$SSH_USER@$LIGHTSAIL_HOST" "sudo systemctl restart $SERVICE_NAME"
          sleep 3
          # shellcheck disable=SC2029
          ssh "$SSH_USER@$LIGHTSAIL_HOST" "systemctl is-active $SERVICE_NAME"

      # ── Frontend ─────────────────────────────────────────────────────────────

      - name: Build frontend
        if: steps.changes.outputs.deploy_frontend == 'true'
        working-directory: frontend
        env:
          VITE_API_BASE_URL: https://${{ secrets.API_DOMAIN }}
          VITE_BASE_PATH: /
        run: |
          GIT_VER="${{ steps.changes.outputs.git_version }}"
          BUILD_TIME="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "{\"version\":\"$GIT_VER\",\"buildTime\":\"$BUILD_TIME\"}" > public/version.json
          npm ci && npm run build

      - name: Sync frontend to S3
        if: steps.changes.outputs.deploy_frontend == 'true'
        run: |
          aws s3 sync frontend/dist/assets/ s3://${{ secrets.FRONTEND_BUCKET_NAME }}/assets/ \
            --cache-control "public, max-age=31536000, immutable" \
            --delete
          aws s3 sync frontend/dist/ s3://${{ secrets.FRONTEND_BUCKET_NAME }}/ \
            --exclude 'assets/*' \
            --cache-control "no-cache, no-store, must-revalidate" \
            --delete

      - name: Invalidate CloudFront
        if: steps.changes.outputs.deploy_frontend == 'true'
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CF_DIST_ID }}" \
            --paths "/*"

      # ── Smoke test ───────────────────────────────────────────────────────────

      - name: Smoke test
        env:
          API_DOMAIN: ${{ secrets.API_DOMAIN }}
          FRONTEND_DOMAIN: ${{ secrets.FRONTEND_DOMAIN }}
          EXPECTED_VERSION: ${{ steps.changes.outputs.git_version }}
          DEPLOY_BACKEND: ${{ steps.changes.outputs.deploy_backend }}
          DEPLOY_FRONTEND: ${{ steps.changes.outputs.deploy_frontend }}
        run: |
          check() {
            local label="$1" url="$2" expected="${3:-200}"
            status=$(curl -o /dev/null -s -w "%{http_code}" --max-time 15 "$url")
            if [[ "$status" == "$expected" ]]; then
              echo "PASS $label - HTTP $status"
            else
              echo "FAIL $label - expected $expected, got $status"
              exit 1
            fi
          }
          check_version() {
            local label="$1" url="$2"
            local actual attempts=10 delay=6
            for ((i=1; i<=attempts; i++)); do
              actual=$(curl -s --max-time 15 "$url" | jq -r '.version')
              if [[ "$actual" == "$EXPECTED_VERSION" ]]; then
                echo "PASS $label version - $actual"
                return 0
              fi
              echo "  attempt $i/$attempts: got $actual, waiting ${delay}s..."
              sleep $delay
            done
            echo "FAIL $label version - expected $EXPECTED_VERSION, got $actual"
            exit 1
          }
          check "API health"    "https://$API_DOMAIN/health"
          check "API redirect"  "http://$API_DOMAIN" "301"
          check "Frontend root" "https://$FRONTEND_DOMAIN/"
          if [[ "$DEPLOY_BACKEND"  == "true" ]]; then
            check_version "backend"  "https://$API_DOMAIN/health";
          fi
          if [[ "$DEPLOY_FRONTEND" == "true" ]]; then
            check_version "frontend" "https://$FRONTEND_DOMAIN/version.json";
          fi

      # ── Cleanup ──────────────────────────────────────────────────────────────

      - name: Close SSH for this runner
        if: always()
        run: |
          aws lightsail close-instance-public-ports \
            --no-cli-pager \
            --instance-name "${{ secrets.LIGHTSAIL_INSTANCE_NAME }}" \
            --port-info fromPort=22,toPort=22,protocol=TCP,cidrs="[\"${{ steps.ssh_access.outputs.runner_ip }}/32\"]"

      # ── Update deployed SHAs ─────────────────────────────────────────────────

      - name: Update deployed SHAs in SSM
        run: |
          if [[ "${{ steps.changes.outputs.deploy_backend }}" == "true" ]]; then
            aws ssm put-parameter \
              --name "$SSM_PREFIX/LAST_DEPLOYED_BACKEND_SHA" \
              --value "$GITHUB_SHA" \
              --type String \
              --overwrite
            echo "Updated backend SHA: $GITHUB_SHA"
          fi
          if [[ "${{ steps.changes.outputs.deploy_frontend }}" == "true" ]]; then
            aws ssm put-parameter \
              --name "$SSM_PREFIX/LAST_DEPLOYED_FRONTEND_SHA" \
              --value "$GITHUB_SHA" \
              --type String \
              --overwrite
            echo "Updated frontend SHA: $GITHUB_SHA"
          fi
