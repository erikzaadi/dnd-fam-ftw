name: Weekly Metrics

on:
  schedule:
    - cron: '0 10 * * 0'  # Sunday 10:00 AM UTC
  workflow_dispatch:

env:
  AWS_REGION: eu-west-1
  SSM_PREFIX: /dnd-fam-ftw/prod
  METRICS_SSM_PATH: /dnd-fam-ftw/internal/last-weekly-metrics
  NARRATION_METRICS_SSM_PATH: /dnd-fam-ftw/internal/last-weekly-narration-metrics
  CURRENT_DIR: /opt/dnd-fam-ftw/current
  APP_ENV_FILE: /opt/dnd-fam-ftw/app.env
  SSH_USER: ubuntu

jobs:
  metrics:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Open SSH for this runner
        id: ssh_access
        run: |
          RUNNER_IP=$(curl -s https://checkip.amazonaws.com)
          echo "runner_ip=$RUNNER_IP" >> "$GITHUB_OUTPUT"
          aws lightsail open-instance-public-ports \
            --no-cli-pager \
            --instance-name "${{ secrets.LIGHTSAIL_INSTANCE_NAME }}" \
            --port-info fromPort=22,toPort=22,protocol=TCP,cidrs="[\"$RUNNER_IP/32\"]"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.LIGHTSAIL_HOST }}" >> ~/.ssh/known_hosts

      - name: Fetch previous metrics from SSM
        id: previous
        run: |
          PREV=$(aws ssm get-parameter \
            --name "$METRICS_SSM_PATH" \
            --query 'Parameter.Value' --output text 2>/dev/null || echo "")
          {
            echo "output<<EOF"
            echo "$PREV"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Fetch previous narration metrics from SSM
        id: previous_narration
        run: |
          PREV=$(aws ssm get-parameter \
            --name "$NARRATION_METRICS_SSM_PATH" \
            --query 'Parameter.Value' --output text 2>/dev/null || echo "")
          {
            echo "output<<EOF"
            echo "$PREV"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Gather metrics
        id: metrics
        run: |
          # shellcheck disable=SC2029
          METRICS=$(ssh "$SSH_USER@${{ secrets.LIGHTSAIL_HOST }}" \
            "bash -lc 'cd $CURRENT_DIR && node --env-file=$APP_ENV_FILE dist/scripts/cli.js metrics'")
          {
            echo "output<<EOF"
            echo "$METRICS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Gather narration diagnostics
        id: narration
        run: |
          # shellcheck disable=SC2029
          NARRATION=$(ssh "$SSH_USER@${{ secrets.LIGHTSAIL_HOST }}" \
            "bash -lc 'cd $CURRENT_DIR && node --env-file=$APP_ENV_FILE dist/scripts/cli.js metrics narration --json'")
          SUMMARY=$(echo "$NARRATION" | jq -c '{
            diagnostic_turns: length,
            retried_turns: ([.[] | select(.narration_retried == true)] | length),
            failed_turns: ([.[] | select(.narration_failed == true)] | length),
            failure_reasons: (
              [.[] | select(.narration_failed == true) | (.narration_retry_validation_error // .narration_validation_error // "unknown")]
              | sort
              | group_by(.)
              | map({reason: .[0], count: length})
              | sort_by(-.count)
            ),
            recent_failures: [
              .[] | select(.narration_failed == true) | {
                session_id,
                session_name,
                character_name,
                reason: (.narration_retry_validation_error // .narration_validation_error // "unknown")
              }
            ][0:5]
          }')
          {
            echo "output<<EOF"
            echo "$SUMMARY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Analyze narration health
        id: narration_health
        env:
          CURRENT_NARRATION_METRICS: ${{ steps.narration.outputs.output }}
          PREV_NARRATION_METRICS: ${{ steps.previous_narration.outputs.output }}
        run: |
          CURRENT_FAILED=$(echo "$CURRENT_NARRATION_METRICS" | jq -r '.failed_turns // 0')
          if [ -n "$PREV_NARRATION_METRICS" ]; then
            PREVIOUS_FAILED=$(echo "$PREV_NARRATION_METRICS" | jq -r '.failed_turns // 0' 2>/dev/null || echo 0)
          else
            PREVIOUS_FAILED=0
          fi
          DELTA=$((CURRENT_FAILED - PREVIOUS_FAILED))
          SIGNIFICANT=false
          if [ "$DELTA" -ge 3 ]; then
            SIGNIFICANT=true
          elif [ "$PREVIOUS_FAILED" -gt 0 ] && [ "$CURRENT_FAILED" -ge $((PREVIOUS_FAILED * 2)) ]; then
            SIGNIFICANT=true
          fi
          if [ "$SIGNIFICANT" = true ]; then
            MESSAGE="Significant increase in narration failures: $CURRENT_FAILED this week, up from $PREVIOUS_FAILED."
          else
            MESSAGE="Narration failures: $CURRENT_FAILED this week, previous $PREVIOUS_FAILED."
          fi
          {
            echo "significant=$SIGNIFICANT"
            echo "message=$MESSAGE"
          } >> "$GITHUB_OUTPUT"

      - name: Gather invite requests
        id: invites
        run: |
          # shellcheck disable=SC2029
          INVITES=$(ssh "$SSH_USER@${{ secrets.LIGHTSAIL_HOST }}" \
            "bash -lc 'cd $CURRENT_DIR && node --env-file=$APP_ENV_FILE dist/scripts/cli.js invite-requests list --json'")
          COUNT=$(echo "$INVITES" | jq 'length')
          {
            echo "output<<EOF"
            echo "$INVITES"
            echo "EOF"
            echo "count=$COUNT"
          } >> "$GITHUB_OUTPUT"

      - name: Generate AI summary
        id: summary
        env:
          CURRENT_METRICS: ${{ steps.metrics.outputs.output }}
          PREV_METRICS: ${{ steps.previous.outputs.output }}
          CURRENT_NARRATION_METRICS: ${{ steps.narration.outputs.output }}
          PREV_NARRATION_METRICS: ${{ steps.previous_narration.outputs.output }}
          NARRATION_HEALTH: ${{ steps.narration_health.outputs.message }}
        run: |
          OPENAI_API_KEY=$(aws ssm get-parameter \
            --name "$SSM_PREFIX/OPENAI_API_KEY" \
            --with-decryption \
            --query 'Parameter.Value' --output text)

          PROMPT="You are a usage analyst for a family D&D game app."
          PROMPT="$PROMPT Summarize this week's metrics in 2 sentences, highlighting trends vs last week."
          PROMPT="$PROMPT Include narration retry/fallback health."
          PROMPT="$PROMPT Explicitly call out a significant increase in narration failures"
          PROMPT="$PROMPT when failed_turns rose by 3 or more, or doubled from a nonzero previous value."
          PROMPT="$PROMPT Be concise and friendly. If no previous metrics, just summarize current state."
          MESSAGE=$(printf '%s' "$PROMPT")
          MESSAGE=$(printf '%s\n\nCurrent usage:\n%s' "$MESSAGE" "$CURRENT_METRICS")
          MESSAGE=$(printf '%s\n\nPrevious usage:\n%s' "$MESSAGE" "${PREV_METRICS:-none}")
          MESSAGE=$(printf '%s\n\nNarration health:\n%s' "$MESSAGE" "$NARRATION_HEALTH")
          MESSAGE=$(printf '%s\n\nCurrent narration diagnostics:\n%s' "$MESSAGE" "$CURRENT_NARRATION_METRICS")
          MESSAGE=$(printf '%s\n\nPrevious narration diagnostics:\n%s' "$MESSAGE" "${PREV_NARRATION_METRICS:-none}")
          PAYLOAD=$(jq -n \
            --arg message "$MESSAGE" \
            '{
              model: "gpt-4.1",
              max_tokens: 160,
              messages: [{
                role: "user",
                content: $message
              }]
            }')

          SUMMARY=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" | jq -r '.choices[0].message.content')

          {
            echo "output<<EOF"
            echo "$SUMMARY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build notification message
        id: message
        env:
          SUMMARY: ${{ steps.summary.outputs.output }}
          INVITES_JSON: ${{ steps.invites.outputs.output }}
          INVITES_COUNT: ${{ steps.invites.outputs.count }}
          NARRATION_HEALTH: ${{ steps.narration_health.outputs.message }}
          NARRATION_SIGNIFICANT: ${{ steps.narration_health.outputs.significant }}
        run: |
          MSG="$SUMMARY"
          if [ "$NARRATION_SIGNIFICANT" = "true" ]; then
            MSG=$(printf '%s\n\n%s' "$MSG" "$NARRATION_HEALTH")
          fi
          if [ "${INVITES_COUNT:-0}" -gt 0 ]; then
            EMAILS=$(echo "$INVITES_JSON" | jq -r '.[].email' | paste -sd ', ')
            MSG=$(printf '%s\n\nPending invites (%s): %s' "$MSG" "$INVITES_COUNT" "$EMAILS")
          fi
          {
            echo "output<<EOF"
            echo "$MSG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Send summary to Pushover
        uses: ./.github/actions/notify-pushover
        with:
          status: success
          token: ${{ secrets.PUSHOVER_TOKEN }}
          user: ${{ secrets.PUSHOVER_USER }}
          title: Weekly Metrics
          message: ${{ steps.message.outputs.output }}

      - name: Save metrics to SSM
        run: |
          aws ssm put-parameter \
            --name "$METRICS_SSM_PATH" \
            --value "${{ steps.metrics.outputs.output }}" \
            --type String \
            --overwrite

      - name: Save narration metrics to SSM
        env:
          NARRATION_SUMMARY: ${{ steps.narration.outputs.output }}
        run: |
          aws ssm put-parameter \
            --name "$NARRATION_METRICS_SSM_PATH" \
            --value "$NARRATION_SUMMARY" \
            --type String \
            --overwrite

      - name: Close SSH for this runner
        if: always()
        run: |
          aws lightsail close-instance-public-ports \
            --no-cli-pager \
            --instance-name "${{ secrets.LIGHTSAIL_INSTANCE_NAME }}" \
            --port-info fromPort=22,toPort=22,protocol=TCP,cidrs="[\"${{ steps.ssh_access.outputs.runner_ip }}/32\"]"
