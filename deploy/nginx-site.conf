# Verified Nginx Configuration for Subpath Deployment
# Copy these blocks into your existing server { ... } block

location /dnd-fam-ftw/ {
    alias /var/www/dnd-fam-ftw/frontend/dist/;
    index index.html;
    try_files $uri $uri/ /dnd-fam-ftw/index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires 0;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}

location = /dnd-fam-ftw {
    return 301 /dnd-fam-ftw/;
}

location /dnd-fam-ftw/api/ {
    proxy_pass http://localhost:3001/api/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;
}
